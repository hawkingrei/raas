name = "raas"
main = "src/index.ts"
compatibility_date = "2024-12-18"

[observability]
enabled = true
head_sampling_rate = 1

[triggers]
crons = ["* * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "raas"
database_id = "9f5e09c6-116b-47bc-a2ca-6594fee9cfda"

[vars]
# Comma-separated failed check names that should be ignored
CHECK_BLACKLIST = "license/cla,pull-error-log-review,tide,check-issue-triage-complete"

# Scan settings
SCAN_LOOKBACK_HOURS = "48"
SCAN_INTERVAL_MINUTES = "5"
SCAN_BATCH_SIZE = "10"
OK_TO_TEST_LOOKBACK_MINUTES = "10"
OK_TO_TEST_SCAN_INTERVAL_MINUTES = "10"
OK_TO_TEST_QUEUE_INTERVAL_MINUTES = "1"
OK_TO_TEST_FALLBACK_BATCH_SIZE = "20"

# Concurrency per scan window (Asia/Shanghai)
DAY_MAX_RETESTS = "2"
NIGHT_MAX_RETESTS = "5"

# Secrets to be configured via `wrangler secret put`:
# - GITHUB_TOKEN: GitHub personal access token
# - GITHUB_WEBHOOK_SECRET: optional HMAC secret for GitHub webhook
